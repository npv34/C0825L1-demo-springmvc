<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container">
        <div class="card">
            <div class="card-header">
                Create user
            </div>
            <div class="card-body">
                <form th:action="@{/users/store}" method="post" th:object="${userRequest}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" th:field="*{username}" class="form-control" id="username" placeholder="use1">
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Email</label>
                        <input type="email" name="email" th:field="*{email}" class="form-control" id="email" placeholder="email@gmail.com">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" th:field="*{password}" class="form-control" id="password" placeholder="pass1">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Roles</label>
                        <select name="roleId" class="form-select" id="role">
                            <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>

</section>
</body>
</html>
