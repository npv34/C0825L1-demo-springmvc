<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"/>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Không tìm thấy trang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: #0d6efd;
            text-shadow: 4px 4px 0px #dee2e6;
        }
    </style>
</head>
<body>

<div class="container error-container">
    <div class="text-center">
        <h1 class="error-code mb-0">404</h1>
        <h2 class="display-4 fw-bold mb-3">Rất tiếc! Không tìm thấy trang</h2>
        <p class="lead text-muted mb-5" th:text="${message}" >
        </p>
        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <a href="/" class="btn btn-primary btn-lg px-4 gap-3">Về trang chủ</a>
            <a href="/contact" class="btn btn-outline-secondary btn-lg px-4">Báo cáo lỗi</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
